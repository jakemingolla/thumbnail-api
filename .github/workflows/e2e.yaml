name: 🧪 E2E (LocalStack)
on: pull_request

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout Repo
        uses: actions/checkout@v7

      - name: 🏗 Setup
        uses: ./.github/actions/setup

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          # Wrapper injects extra stdout and breaks `terraform output -json`.
          terraform_wrapper: false

      - name: 🧪 Run e2e (LocalStack)
        run: just test-e2e

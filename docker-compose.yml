name: ${COMPOSE_PROJECT_NAME:-thumbnail-api}

services:
  localstack:
    container_name: "${LOCALSTACK_DOCKER_NAME:-localstack-main}"
    image: localstack/localstack:4
    ports:
      - "127.0.0.1:${LOCALSTACK_EDGE_PORT:-4566}:4566" # LocalStack edge / gateway
      # Host range is remapped; container keeps 4510-4559.
      - "127.0.0.1:${LOCALSTACK_EXTERNAL_HOST_START:-4510}-${LOCALSTACK_EXTERNAL_HOST_END:-4559}:4510-4559"
    environment:
      # LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      - DEBUG=${DEBUG:-0}
      # Limit to services this project needs (community/free tier).
      - SERVICES=s3,lambda,sqs,dynamodb,apigateway,iam
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./.localstack}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
